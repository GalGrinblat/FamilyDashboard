name: CI/CD Pipeline

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Check Types
        run: npx tsc --noEmit

      # We just build the app to ensure no compilation errors exists. Vercel automatically deploys on push to main via integration.
      - name: Build Application
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: 'https://example.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'example-anon-key'
